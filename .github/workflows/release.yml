name: Build release artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (for example v1.0.0)
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: HiresChess-windows.zip
          - os: macos-latest
            artifact_name: HiresChess-macos.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build and package release artifact
        run: python release.py

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history + tags, so the annotated tag object is available
          fetch-tags: true

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag name
        id: tag
        run: echo "name=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build release notes from the tag annotation
        # The release body is the annotated tag's message (`git tag -a vX -m ...`),
        # so the notes have a single source. Falls back to a one-liner for a
        # lightweight tag (no annotation) so the release step never gets an empty body.
        run: |
          TAG='${{ steps.tag.outputs.name }}'
          git tag -l --format='%(contents)' "$TAG" > release_body.md
          if [ ! -s release_body.md ]; then echo "Release $TAG" > release_body.md; fi
          echo "----- release_body.md -----"
          cat release_body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          body_path: release_body.md
          # draft:false -> non nasconde mai una release pubblica gia' esistente
          # (con draft:true questo step trasformava v1.0.0 in bozza = 404 pubblico).
          draft: false
          files: |
            dist/HiresChess-windows.zip
            dist/HiresChess-macos.dmg