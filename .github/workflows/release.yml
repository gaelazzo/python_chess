name: Build release artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (for example v1.0.0)
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: HiresChess-windows.zip
          - os: macos-latest
            artifact_name: HiresChess-macos.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build and package release artifact
        run: python release.py

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          # draft:false -> non nasconde mai una release pubblica gia' esistente
          # (con draft:true questo step trasformava v1.0.0 in bozza = 404 pubblico).
          draft: false
          files: |
            dist/HiresChess-windows.zip
            dist/HiresChess-macos.dmg